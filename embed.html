<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synth UI demo</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { height: 100%; background: transparent; }
    body.embed { display: flex; flex-direction: column; margin: 0; }
    .embed .stage { flex: 1; height: auto; }
    .embed-bar {
      display: flex; justify-content: flex-end; gap: 6px; padding: 6px 8px;
    }
    .embed-bar button {
      font-size: 12px; padding: 4px 10px; border-radius: 999px; opacity: 0.75;
    }
    .embed-bar button:hover { opacity: 1; }
  </style>
</head>
<body class="embed">
  <div id="stage" class="stage" data-fit="both"></div>
  <div class="embed-bar">
    <button id="btnSound" title="Toggle sound">🔇</button>
    <button id="btnReplay" title="Replay">↻ Replay</button>
  </div>
  <script type="module">
    import { Player } from './js/engine.js';

    function decodeScene(hash) {
      const b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(decodeURIComponent(escape(atob(b64))));
    }

    let scene;
    try {
      scene = decodeScene(location.hash.slice(1));
    } catch {
      document.body.innerHTML = '<p style="color:#7c89b8;font:14px system-ui;padding:20px">Invalid or missing scene data in the URL.</p>';
      throw new Error('bad scene');
    }

    // Browsers block audio before a user gesture — start muted, let the
    // sound button opt in.
    const wantedSound = !(scene.sound === false || scene.sound === 'off');
    scene.sound = false;

    const player = new Player(document.getElementById('stage'));
    player.load(scene);
    setTimeout(() => player.play(), 400);

    const btnSound = document.getElementById('btnSound');
    if (!wantedSound) btnSound.style.display = 'none';
    btnSound.addEventListener('click', () => {
      scene.sound = scene.sound ? false : true;
      player.fx.enabled = scene.sound;
      if (scene.sound) player.fx.ensure();
      btnSound.textContent = scene.sound ? '🔊' : '🔇';
    });
    document.getElementById('btnReplay').addEventListener('click', () => player.play());
  </script>
</body>
</html>
